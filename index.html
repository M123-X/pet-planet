<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐾 萌宠星球 - 和千万铲屎官一起记录毛孩子的每一天</title>
<style>
/* ============ CSS Variables ============ */
:root {
  --c-primary: #FF8C42; --c-primary-dark: #E6732A; --c-primary-light: #FFA86B;
  --c-accent: #FFD4A8; --c-bg: #FFF8F0; --c-bg-warm: #FFF3E8;
  --c-card: #FFFFFF; --c-text: #4A3728; --c-text-mid: #8B7355;
  --c-text-light: #B8A090; --c-text-lighter: #D4C8BB; --c-border: #F0E0D0;
  --c-heart: #FF6B6B; --c-star: #FFB347; --c-success: #6BCB77; --c-gold: #FFB347;
  --c-silver: #B0BEC5; --c-bronze: #D4A574;
  --c-shadow: 0 2px 12px rgba(74,55,40,0.07); --c-shadow-md: 0 4px 20px rgba(74,55,40,0.10);
  --c-shadow-lg: 0 8px 32px rgba(74,55,40,0.14);
  --radius-xs: 6px; --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px; --radius-full: 50%;
  --font: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',system-ui,-apple-system,sans-serif;
  --nav-h: 64px; --status-h: 40px;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:#EDE4DA;display:flex;align-items:center;justify-content:center;min-height:100vh;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;user-select:none}

/* Phone Frame */
.app-wrapper{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.phone-frame{width:400px;height:860px;max-height:100vh;background:var(--c-bg);border-radius:28px;overflow:hidden;position:relative;box-shadow:0 0 0 3px #3a3028,0 0 0 7px #1a1815,0 20px 60px rgba(0,0,0,0.35);display:flex;flex-direction:column}
@media(max-width:440px),(max-height:700px){.phone-frame{width:100%;height:100%;max-height:100vh;border-radius:0;box-shadow:none}}
.status-bar{height:var(--status-h);padding:0 20px;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;color:var(--c-text);flex-shrink:0;background:var(--c-bg)}
.status-bar .time{font-size:13px}.status-icons{display:flex;gap:6px;font-size:11px;align-items:center}
.main-content{flex:1;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;position:relative}
.main-content::-webkit-scrollbar{width:0}
.page{display:none;flex-direction:column;min-height:100%;opacity:0;transform:translateY(6px);transition:opacity .25s,transform .25s}
.page.active{display:flex;opacity:1;transform:translateY(0)}
.page-header{padding:12px 16px 6px;flex-shrink:0}
.page-header .title{font-size:22px;font-weight:800;color:var(--c-text);letter-spacing:-0.3px}
.page-header .subtitle{font-size:12px;color:var(--c-text-light);margin-top:2px}

/* Search */
.search-wrap{margin:8px 16px;position:relative;flex-shrink:0;z-index:30}
.search-input{width:100%;padding:11px 14px;border-radius:var(--radius-xl);background:#FFF;border:2px solid transparent;outline:none;font-size:13px;font-family:var(--font);color:var(--c-text);box-shadow:0 1px 3px rgba(74,55,40,0.04);transition:all var(--transition)}
.search-input:focus{border-color:var(--c-primary);box-shadow:0 2px 16px rgba(255,140,66,0.15)}
.search-input::placeholder{color:var(--c-text-lighter)}
.search-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#FFF;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);max-height:320px;overflow-y:auto;display:none}
.search-dropdown.show{display:block;animation:fadeInUp .2s ease}
.search-item{padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background var(--transition);border-bottom:1px solid #FDF6EE}
.search-item:last-child{border-bottom:none}.search-item:active{background:#FFF8F0}
.search-item .si-avatar{width:34px;height:34px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.search-item .si-info{flex:1;min-width:0}.search-item .si-name{font-size:13px;font-weight:600;color:var(--c-text)}
.search-item .si-desc{font-size:11px;color:var(--c-text-light);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-item .si-tag{font-size:10px;padding:3px 8px;border-radius:var(--radius-xl);background:#FFF5EC;color:var(--c-primary);flex-shrink:0;font-weight:600}
.search-empty{padding:28px;text-align:center;font-size:13px;color:var(--c-text-light)}

/* Channels */
.channel-row{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;flex-shrink:0;-ms-overflow-style:none;scrollbar-width:none}
.channel-row::-webkit-scrollbar{display:none}
.channel-tab{flex-shrink:0;padding:7px 15px;border-radius:var(--radius-xl);font-size:13px;font-weight:500;color:var(--c-text-light);background:transparent;cursor:pointer;transition:all var(--transition);white-space:nowrap;border:none;font-family:var(--font)}
.channel-tab.active{background:var(--c-primary);color:#FFF;font-weight:700;box-shadow:0 3px 14px rgba(255,140,66,0.35)}
.channel-tab:active{transform:scale(0.95)}

/* Hot Topics */
.hot-topics-bar{margin:4px 16px 8px;padding:10px 14px;background:linear-gradient(135deg,#FFF5EC,#FFE8D6);border-radius:var(--radius-lg);display:flex;align-items:center;gap:8px;overflow-x:auto;flex-shrink:0}
.hot-topics-bar .ht-label{font-size:13px;font-weight:700;color:var(--c-primary);flex-shrink:0;white-space:nowrap}
.hot-topic-chip{flex-shrink:0;padding:5px 12px;background:#FFF;border-radius:var(--radius-xl);font-size:12px;color:var(--c-text);cursor:pointer;transition:all var(--transition);white-space:nowrap;border:none;font-family:var(--font)}
.hot-topic-chip:active{background:var(--c-primary);color:#FFF}

/* Feed */
.feed-list{padding:0 16px 120px;display:flex;flex-direction:column;gap:10px}
.feed-card{background:var(--c-card);border-radius:var(--radius-lg);padding:14px;box-shadow:var(--c-shadow);transition:all var(--transition);cursor:pointer}
.feed-card:active{box-shadow:var(--c-shadow-md)}
.feed-card .card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.card-top .avatar{width:40px;height:40px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.avatar-cat{background:linear-gradient(135deg,#FFD4A8,#FFA86B)}.avatar-dog{background:linear-gradient(135deg,#FFE0B2,#FFAB40)}
.avatar-reptile{background:linear-gradient(135deg,#A5D6A7,#66BB6A)}.avatar-fish{background:linear-gradient(135deg,#81D4FA,#29B6F6)}
.avatar-bird{background:linear-gradient(135deg,#CE93D8,#AB47BC)}.avatar-small{background:linear-gradient(135deg,#FFCCBC,#FF8A65)}
.avatar-other{background:linear-gradient(135deg,#FFD4A8,#FFB74D)}
.card-top .user-info{flex:1;min-width:0}.user-info .nickname{font-size:14px;font-weight:700;color:var(--c-text)}
.user-info .meta-row{font-size:11px;color:var(--c-text-light);display:flex;gap:8px;margin-top:1px}
.card-body .content-text{font-size:14px;line-height:1.7;color:var(--c-text);margin-bottom:8px;word-break:break-word}
.card-body .content-text .expand-btn{color:var(--c-primary);font-size:13px;cursor:pointer;font-weight:600}
.img-grid{display:grid;gap:3px;border-radius:var(--radius-sm);overflow:hidden;margin-bottom:6px}
.img-grid.g-1{grid-template-columns:1fr}.img-grid.g-2{grid-template-columns:1fr 1fr}
.img-grid.g-3{grid-template-columns:1fr 1fr 1fr}.img-grid.g-4{grid-template-columns:1fr 1fr}.img-grid.g-multi{grid-template-columns:1fr 1fr 1fr}
.img-grid img{width:100%;aspect-ratio:1;object-fit:cover;background:linear-gradient(135deg,#FDF6EE,#FFF0E0);display:block;cursor:pointer}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.card-tag{font-size:12px;color:var(--c-primary);cursor:pointer;font-weight:500;border:none;background:none;font-family:var(--font);padding:0}
.card-actions{display:flex;justify-content:space-around;align-items:center;padding-top:8px;border-top:1px solid var(--c-border)}
.act-btn{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--c-text-light);cursor:pointer;padding:7px 12px;border-radius:var(--radius-xl);transition:all var(--transition);border:none;background:none;font-family:var(--font);white-space:nowrap}
.act-btn:active{background:#FFF5EC;transform:scale(0.94)}.act-btn.is-liked{color:var(--c-heart);font-weight:700}.act-btn.is-collected{color:var(--c-star);font-weight:700}

/* Rank Entry */
.rank-entry{margin:8px 16px 100px;background:var(--c-card);border-radius:var(--radius-lg);padding:14px;box-shadow:var(--c-shadow);display:flex;justify-content:space-around}
.rank-item{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--c-text);cursor:pointer;padding:8px 12px;border-radius:var(--radius-md);transition:all var(--transition);border:none;background:none;font-family:var(--font)}
.rank-item:active{background:#FFF5EC}.rank-item .ri-icon{font-size:22px}

/* Home */
.home-hero{padding:20px 16px;text-align:center}
.home-hero .hero-emoji{font-size:64px;display:block;margin-bottom:8px}
.home-hero .hero-title{font-size:20px;font-weight:800;color:var(--c-text);margin-bottom:4px}
.home-hero .hero-sub{font-size:13px;color:var(--c-text-light);line-height:1.6}
.home-cards{padding:0 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:100px}
.home-card{background:var(--c-card);border-radius:var(--radius-lg);padding:18px 14px;box-shadow:var(--c-shadow);cursor:pointer;transition:all var(--transition);text-align:center;border:none;font-family:var(--font)}
.home-card:active{transform:scale(0.96);box-shadow:var(--c-shadow-md)}
.home-card .hc-icon{font-size:36px;display:block;margin-bottom:6px}
.home-card .hc-title{font-size:14px;font-weight:700;color:var(--c-text);margin-bottom:4px}
.home-card .hc-desc{font-size:11px;color:var(--c-text-light);line-height:1.5}

/* Diary */
.pet-switcher{display:flex;gap:14px;padding:8px 16px;overflow-x:auto;flex-shrink:0;-ms-overflow-style:none;scrollbar-width:none}
.pet-switcher::-webkit-scrollbar{display:none}
.pet-card{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex-shrink:0;transition:all var(--transition);border:none;background:none;font-family:var(--font)}
.pet-card .pet-av{width:54px;height:54px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;font-size:30px;border:3px solid transparent;transition:all var(--transition)}
.pet-card.selected .pet-av{border-color:var(--c-primary);box-shadow:0 4px 16px rgba(255,140,66,0.35)}
.pet-card .pet-nm{font-size:12px;font-weight:600;color:var(--c-text)}
.pet-card .pet-age{font-size:10px;color:var(--c-text-light)}
.pet-card.add-pet .pet-av{border:2px dashed var(--c-border);background:transparent!important;color:var(--c-text-lighter);font-size:22px}
.timeline-wrap{padding:12px 16px 100px;position:relative}
.tl-month{margin-bottom:18px}
.tl-month .tl-m-label{font-size:13px;font-weight:700;color:var(--c-primary);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.tl-m-label::after{content:'';flex:1;height:1px;background:var(--c-border)}
.tl-date{font-size:12px;color:var(--c-text-light);margin-bottom:6px;padding-left:4px;display:flex;align-items:center;gap:6px}
.tl-date .tl-badge{font-size:10px;background:#FFF0E0;color:var(--c-primary);padding:2px 8px;border-radius:var(--radius-xl);font-weight:700}
.diary-card{background:var(--c-card);border-radius:var(--radius-lg);padding:14px;box-shadow:var(--c-shadow);margin-bottom:10px;margin-left:14px;position:relative;transition:all var(--transition)}
.diary-card .vis-badge{position:absolute;top:12px;right:12px;font-size:16px}
.diary-card .diary-text{font-size:14px;line-height:1.7;color:var(--c-text);margin:4px 0;word-break:break-word}
.diary-card .diary-imgs{display:grid;gap:3px;border-radius:var(--radius-sm);overflow:hidden;margin-top:8px}
.diary-card .diary-imgs.d2{grid-template-columns:1fr 1fr}.diary-card .diary-imgs.d1{grid-template-columns:1fr}
.diary-card .diary-imgs img{width:100%;aspect-ratio:1;object-fit:cover;background:linear-gradient(135deg,#FDF6EE,#FFF0E0);cursor:pointer}
.diary-card .diary-actions{display:flex;gap:12px;margin-top:10px;padding-top:8px;border-top:1px solid var(--c-border)}
.diary-fab{position:sticky;bottom:0;padding:12px 16px;background:linear-gradient(180deg,transparent,var(--c-bg) 40%)}
.diary-fab .fab-btn{width:100%;padding:13px;border-radius:var(--radius-xl);background:linear-gradient(135deg,var(--c-primary),var(--c-primary-light));color:#FFF;font-size:14px;font-weight:700;border:none;cursor:pointer;box-shadow:0 4px 18px rgba(255,140,66,0.35);transition:all var(--transition);font-family:var(--font)}
.diary-fab .fab-btn:active{transform:scale(0.97)}

/* Profile */
.profile-header{padding:24px 16px 16px;text-align:center}
.profile-header .ph-avatar{width:72px;height:72px;border-radius:var(--radius-full);background:linear-gradient(135deg,var(--c-accent),var(--c-primary-light));display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 10px}
.profile-header .ph-name{font-size:18px;font-weight:700;color:var(--c-text)}
.profile-header .ph-bio{font-size:12px;color:var(--c-text-light);margin-top:4px}
.profile-stats{display:flex;justify-content:space-around;padding:12px 16px;margin:0 16px;background:var(--c-card);border-radius:var(--radius-lg);box-shadow:var(--c-shadow)}
.profile-stat{text-align:center;cursor:pointer;border:none;background:none;font-family:var(--font)}
.profile-stat .ps-num{font-size:20px;font-weight:800;color:var(--c-primary);display:block}
.profile-stat .ps-label{font-size:11px;color:var(--c-text-light);margin-top:2px}
.profile-menu{margin:16px;display:flex;flex-direction:column;gap:2px}
.profile-menu-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--c-card);cursor:pointer;transition:all var(--transition);font-size:14px;color:var(--c-text);border:none;font-family:var(--font);width:100%;text-align:left}
.profile-menu-item:first-child{border-radius:var(--radius-lg) var(--radius-lg) var(--radius-xs) var(--radius-xs)}
.profile-menu-item:last-child{border-radius:var(--radius-xs) var(--radius-xs) var(--radius-lg) var(--radius-lg)}
.profile-menu-item:only-child{border-radius:var(--radius-lg)}
.profile-menu-item:active{background:#FFF5EC}
.profile-menu-item .pm-icon{font-size:20px;width:28px;text-align:center}
.profile-menu-item .pm-arrow{margin-left:auto;color:var(--c-text-lighter)}

/* Nav */
.bottom-nav{height:var(--nav-h);background:#FFF;display:flex;align-items:center;justify-content:space-around;border-top:1px solid var(--c-border);flex-shrink:0;padding:0 4px 6px;position:relative;z-index:20}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:20px;color:var(--c-text-lighter);cursor:pointer;transition:all var(--transition);padding:4px 14px;border:none;background:none;font-family:var(--font)}
.nav-item .nv-label{font-size:10px;font-weight:500}.nav-item.active{color:var(--c-primary)}.nav-item.active .nv-label{font-weight:700}
.nav-item.nav-post{margin-top:-20px}
.nav-item.nav-post .post-circle{width:48px;height:48px;border-radius:var(--radius-full);background:linear-gradient(135deg,var(--c-primary),var(--c-primary-light));display:flex;align-items:center;justify-content:center;font-size:26px;color:#FFF;box-shadow:0 4px 22px rgba(255,140,66,0.42);transition:all var(--transition)}
.nav-item.nav-post:active .post-circle{transform:scale(0.9)}

/* Modals */
.modal-mask{position:absolute;inset:0;background:rgba(74,55,40,0.45);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-mask.open{opacity:1;pointer-events:auto}
.modal-sheet{width:100%;max-height:88%;background:#FFF;border-radius:22px 22px 0 0;overflow-y:auto;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(0.32,0.72,0,1)}
.modal-mask.open .modal-sheet{transform:translateY(0)}
.modal-sheet .ms-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--c-border);position:sticky;top:0;background:#FFF;z-index:2;flex-shrink:0}
.ms-header .ms-cancel{font-size:14px;color:var(--c-text-light);cursor:pointer;border:none;background:none;font-family:var(--font)}
.ms-header .ms-title{font-size:16px;font-weight:700;color:var(--c-text)}
.ms-header .ms-done{font-size:14px;font-weight:700;color:#FFF;background:var(--c-primary);border:none;padding:8px 20px;border-radius:var(--radius-xl);cursor:pointer;font-family:var(--font)}
.ms-body{padding:16px;flex:1;overflow-y:auto}

/* Publish */
.pub-type-row{display:flex;gap:8px;margin-bottom:14px}
.pub-type-btn{flex:1;padding:10px;border-radius:var(--radius-md);border:2px solid var(--c-border);background:#FFF;text-align:center;font-size:13px;font-weight:600;cursor:pointer;transition:all var(--transition);font-family:var(--font);color:var(--c-text-light)}
.pub-type-btn.sel{border-color:var(--c-primary);background:#FFF5EC;color:var(--c-primary)}
.pub-imgs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.pub-imgs .pub-img-add{aspect-ratio:1;border-radius:var(--radius-md);border:2px dashed var(--c-border);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--c-text-lighter);cursor:pointer;transition:all var(--transition);background:#FDF6EE}
.pub-imgs .pub-img-add:active{border-color:var(--c-primary);color:var(--c-primary)}
.pub-imgs .pub-img-thumb{aspect-ratio:1;border-radius:var(--radius-md);overflow:hidden;position:relative}
.pub-imgs .pub-img-thumb img{width:100%;height:100%;object-fit:cover}
.pub-imgs .pub-img-thumb .pub-img-del{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:var(--radius-full);background:rgba(0,0,0,0.5);color:#FFF;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;border:none}
.pub-textarea{width:100%;min-height:100px;border:none;resize:none;font-size:14px;font-family:var(--font);color:var(--c-text);line-height:1.7;outline:none;background:transparent}
.pub-textarea::placeholder{color:var(--c-text-lighter)}
.pub-opt{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-top:1px solid #F5EDE4;font-size:13px;cursor:pointer;border:none;background:none;font-family:var(--font);width:100%;color:var(--c-text)}
.pub-opt .po-label{display:flex;align-items:center;gap:8px}.pub-opt .po-val{color:var(--c-text-light);display:flex;align-items:center;gap:4px}

/* Comment */
.comment-body{padding:0;display:flex;flex-direction:column;max-height:55vh}
.comment-list{flex:1;overflow-y:auto;padding:10px 16px}
.comment-item{display:flex;gap:10px;margin-bottom:14px}
.comment-item .cm-avatar{width:32px;height:32px;border-radius:var(--radius-full);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;background:linear-gradient(135deg,#FFD4A8,#FFA86B)}
.comment-item .cm-body{flex:1;min-width:0}.comment-item .cm-name{font-size:12px;font-weight:700;color:var(--c-text)}
.comment-item .cm-text{font-size:13px;color:var(--c-text);margin-top:3px;line-height:1.5;word-break:break-word}
.comment-item .cm-meta{font-size:10px;color:var(--c-text-light);margin-top:4px;display:flex;gap:12px;align-items:center}
.comment-item .cm-reply-btn{font-size:11px;color:var(--c-primary);cursor:pointer;font-weight:600;border:none;background:none;font-family:var(--font)}
.cm-replies{margin-top:8px;padding-left:14px;border-left:2px solid var(--c-border)}
.cm-reply{display:flex;gap:8px;margin-bottom:8px}.cm-reply .cm-avatar{width:26px;height:26px;font-size:13px}
.cm-reply .cm-name{font-size:11px}.cm-reply .cm-text{font-size:12px}
.comment-input-row{display:flex;gap:8px;padding:10px 16px 14px;border-top:1px solid var(--c-border);flex-shrink:0}
.reply-hint{font-size:11px;color:var(--c-primary);background:#FFF5EC;padding:4px 10px;border-radius:var(--radius-xl);display:inline-flex;align-items:center;gap:4px;margin-bottom:6px}
.reply-hint .rh-clear{cursor:pointer;font-size:13px;border:none;background:none;color:var(--c-primary)}
.comment-input-row input{flex:1;padding:10px 14px;border-radius:var(--radius-xl);border:1.5px solid var(--c-border);font-size:13px;outline:none;font-family:var(--font);color:var(--c-text)}
.comment-input-row input:focus{border-color:var(--c-primary)}
.comment-input-row .cm-send{padding:10px 18px;border-radius:var(--radius-xl);background:var(--c-primary);color:#FFF;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);flex-shrink:0}

/* ============ LIGHTBOX ============ */
.lightbox-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .25s}
.lightbox-overlay.open{opacity:1;pointer-events:auto}
.lightbox-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;color:#FFF;flex-shrink:0}
.lightbox-counter{font-size:14px;font-weight:600}
.lightbox-close{font-size:28px;color:#FFF;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-full);background:rgba(255,255,255,0.15);border:none;transition:all var(--transition)}
.lightbox-close:active{background:rgba(255,255,255,0.3)}
.lightbox-stage{flex:1;display:flex;align-items:center;overflow:hidden;position:relative}
.lightbox-track{display:flex;transition:transform .3s cubic-bezier(0.32,0.72,0,1);height:100%;align-items:center}
.lightbox-slide{flex-shrink:0;width:100%;display:flex;align-items:center;justify-content:center;padding:16px}
.lightbox-slide img{max-width:100%;max-height:70vh;object-fit:contain;border-radius:var(--radius-md)}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:var(--radius-full);background:rgba(255,255,255,0.15);color:#FFF;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);z-index:1}
.lightbox-nav:active{background:rgba(255,255,255,0.35)}
.lightbox-nav.prev{left:8px}.lightbox-nav.next{right:8px}
.lightbox-dots{display:flex;justify-content:center;gap:6px;padding:12px}
.lightbox-dot{width:6px;height:6px;border-radius:var(--radius-full);background:rgba(255,255,255,0.3);transition:all var(--transition);border:none;cursor:pointer}
.lightbox-dot.active{background:#FFF;width:20px;border-radius:3px}

/* ============ POST DETAIL ============ */
.post-detail-overlay{position:absolute;inset:0;background:var(--c-bg);z-index:90;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(0.32,0.72,0,1)}
.post-detail-overlay.open{transform:translateX(0)}
.post-detail-header{display:flex;align-items:center;gap:12px;padding:8px 12px;background:var(--c-bg);flex-shrink:0;border-bottom:1px solid var(--c-border)}
.post-detail-header .pd-back{font-size:22px;cursor:pointer;border:none;background:none;font-family:var(--font);padding:8px}
.post-detail-header .pd-title{font-size:15px;font-weight:700;color:var(--c-text)}
.post-detail-body{flex:1;overflow-y:auto;padding:16px}
.post-detail-body .pd-user{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.post-detail-body .pd-avatar{width:44px;height:44px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;font-size:24px}
.post-detail-body .pd-nickname{font-size:15px;font-weight:700;color:var(--c-text)}
.post-detail-body .pd-meta{font-size:11px;color:var(--c-text-light)}
.post-detail-body .pd-text{font-size:15px;line-height:1.8;color:var(--c-text);margin-bottom:12px;word-break:break-word}
.post-detail-body .pd-imgs{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.post-detail-body .pd-imgs img{width:100%;border-radius:var(--radius-md);cursor:pointer}
.post-detail-body .pd-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.post-detail-body .pd-actions{display:flex;justify-content:space-around;padding:12px 0;border-top:1px solid var(--c-border);border-bottom:1px solid var(--c-border);margin-bottom:12px}
.post-detail-body .pd-comments-title{font-size:14px;font-weight:700;color:var(--c-text);margin-bottom:10px}
.post-detail-body .pd-comment-input{display:flex;gap:8px;padding:12px 0;border-top:1px solid var(--c-border)}
.post-detail-body .pd-comment-input input{flex:1;padding:10px 14px;border-radius:var(--radius-xl);border:1.5px solid var(--c-border);font-size:13px;outline:none;font-family:var(--font);color:var(--c-text)}
.post-detail-body .pd-comment-input input:focus{border-color:var(--c-primary)}
.post-detail-body .pd-comment-input button{padding:10px 18px;border-radius:var(--radius-xl);background:var(--c-primary);color:#FFF;border:none;font-weight:700;cursor:pointer;font-family:var(--font);flex-shrink:0}

/* ============ RANKINGS ============ */
.rank-overlay{position:absolute;inset:0;z-index:90;display:flex;flex-direction:column;background:#FFF;transform:translateX(100%);transition:transform .35s cubic-bezier(0.32,0.72,0,1)}
.rank-overlay.open{transform:translateX(0)}
.rank-header{display:flex;align-items:center;gap:12px;padding:4px 8px;border-bottom:1px solid var(--c-border);flex-shrink:0}
.rank-header .rk-back{font-size:22px;cursor:pointer;border:none;background:none;font-family:var(--font);padding:8px}
.rank-header .rk-title{font-size:16px;font-weight:700}
.rank-tabs{display:flex;gap:0;padding:0 16px;border-bottom:1px solid var(--c-border);flex-shrink:0}
.rank-tab-btn{flex:1;padding:12px;font-size:14px;font-weight:600;color:var(--c-text-light);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--font);transition:all var(--transition)}
.rank-tab-btn.active{color:var(--c-primary);border-bottom-color:var(--c-primary)}
.rank-list{flex:1;overflow-y:auto;padding:12px 16px}
.rank-item-row{display:flex;align-items:center;gap:12px;padding:14px 12px;background:var(--c-card);border-radius:var(--radius-lg);margin-bottom:8px;box-shadow:var(--c-shadow);transition:all var(--transition);cursor:pointer}
.rank-item-row:active{transform:scale(0.98)}
.rank-item-row.top-1{background:linear-gradient(135deg,#FFF8E1,#FFE082);box-shadow:0 4px 16px rgba(255,179,71,0.25)}
.rank-item-row.top-2{background:linear-gradient(135deg,#F5F5F5,#E0E0E0);box-shadow:0 4px 16px rgba(158,158,158,0.2)}
.rank-item-row.top-3{background:linear-gradient(135deg,#FFF3E0,#FFCC80);box-shadow:0 4px 16px rgba(212,165,116,0.2)}
.rank-item-row .rk-rank{width:32px;text-align:center;font-size:20px;font-weight:800;flex-shrink:0}
.rank-item-row .rk-rank.gold{color:#E6A817}.rank-item-row .rk-rank.silver{color:#8D9B9E}.rank-item-row .rk-rank.bronze{color:#C48E4F}
.rank-item-row .rk-avatar{width:44px;height:44px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.rank-item-row .rk-info{flex:1;min-width:0}
.rank-item-row .rk-name{font-size:14px;font-weight:700;color:var(--c-text)}
.rank-item-row .rk-desc{font-size:11px;color:var(--c-text-light);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-item-row .rk-score{font-size:14px;font-weight:800;color:var(--c-primary);flex-shrink:0}
/* Rank animation */
@keyframes rankSlideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.rank-anim{animation:rankSlideIn .4s ease forwards;opacity:0}
.rank-anim:nth-child(1){animation-delay:.05s}.rank-anim:nth-child(2){animation-delay:.1s}.rank-anim:nth-child(3){animation-delay:.15s}
.rank-anim:nth-child(4){animation-delay:.2s}.rank-anim:nth-child(5){animation-delay:.25s}.rank-anim:nth-child(6){animation-delay:.3s}
.rank-anim:nth-child(7){animation-delay:.35s}.rank-anim:nth-child(8){animation-delay:.4s}.rank-anim:nth-child(9){animation-delay:.45s}
.rank-anim:nth-child(10){animation-delay:.5s}

/* ============ PICKER (Pet/Topic/Visibility) ============ */
.picker-overlay{position:absolute;inset:0;background:rgba(74,55,40,0.45);z-index:110;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s}
.picker-overlay.open{opacity:1;pointer-events:auto}
.picker-sheet{width:100%;background:#FFF;border-radius:22px 22px 0 0;max-height:70%;overflow-y:auto;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(0.32,0.72,0,1)}
.picker-overlay.open .picker-sheet{transform:translateY(0)}
.picker-sheet .pk-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--c-border);position:sticky;top:0;background:#FFF;z-index:2}
.picker-sheet .pk-title{font-size:15px;font-weight:700;color:var(--c-text)}
.picker-sheet .pk-done{font-size:14px;font-weight:700;color:var(--c-primary);border:none;background:none;cursor:pointer;font-family:var(--font)}
.picker-sheet .pk-option{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background var(--transition);border:none;background:none;font-family:var(--font);width:100%;text-align:left;font-size:14px;color:var(--c-text);border-bottom:1px solid #FDF6EE}
.picker-sheet .pk-option:active{background:#FFF8F0}
.picker-sheet .pk-option.selected{color:var(--c-primary);font-weight:700;background:#FFF5EC}
.picker-sheet .pk-option .pk-check{color:var(--c-primary);font-weight:700;margin-left:auto}
.picker-sheet .pk-option .pk-icon{font-size:20px;width:28px;text-align:center}

/* Toast */
.toast{position:absolute;top:52px;left:50%;transform:translateX(-50%);background:#4A3728;color:#FFF;padding:10px 22px;border-radius:var(--radius-xl);font-size:13px;font-weight:600;z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
.empty-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 32px;text-align:center}
.empty-wrap .empty-emoji{font-size:60px;margin-bottom:12px}
.empty-wrap .empty-text{font-size:14px;color:var(--c-text-light);line-height:1.7}

/* Animations */
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeInUp .35s ease forwards}
@keyframes heartPop{0%{transform:scale(1)}30%{transform:scale(1.35)}60%{transform:scale(.9)}100%{transform:scale(1)}}
.heart-pop{animation:heartPop .45s ease;display:inline-block}

/* ============ PULL TO REFRESH ============ */
.pull-indicator{display:flex;align-items:center;justify-content:center;height:0;overflow:hidden;transition:height .25s;color:var(--c-primary);font-size:13px;font-weight:600;gap:6px}
.pull-indicator.active{height:44px}
.pull-indicator .pull-spin{width:16px;height:16px;border:2px solid var(--c-border);border-top-color:var(--c-primary);border-radius:50%;display:none}
.pull-indicator.refreshing .pull-spin{display:block;animation:pullSpin .6s linear infinite}
.pull-indicator.refreshing .pull-text::after{content:'正在刷新...'}
@keyframes pullSpin{to{transform:rotate(360deg)}}

/* ============ INFINITE SCROLL ============ */
.load-more{padding:16px;text-align:center}
.load-more-btn{width:100%;padding:12px;border-radius:var(--radius-xl);background:var(--c-card);color:var(--c-primary);font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--c-border);font-family:var(--font);transition:all var(--transition)}
.load-more-btn:active{background:#FFF5EC;border-color:var(--c-primary)}
.load-more-btn.loading{opacity:.6;pointer-events:none}

/* ============ HOME PAGE V2 ============ */
.home-clock{text-align:center;padding:16px 16px 8px}
.home-clock .hc-time{font-size:42px;font-weight:800;color:var(--c-text);letter-spacing:-1px}
.home-clock .hc-date{font-size:12px;color:var(--c-text-light);margin-top:2px}
.home-clock .hc-greeting{font-size:14px;color:var(--c-primary);font-weight:700;margin-top:4px}
.home-stats-row{display:flex;gap:8px;padding:8px 16px}
.home-stat-card{flex:1;background:var(--c-card);border-radius:var(--radius-lg);padding:12px;text-align:center;box-shadow:var(--c-shadow);cursor:pointer;transition:all var(--transition);border:none;font-family:var(--font)}
.home-stat-card:active{transform:scale(0.96)}
.home-stat-card .hs-icon{font-size:28px;display:block;margin-bottom:4px}
.home-stat-card .hs-num{font-size:20px;font-weight:800;color:var(--c-primary);display:block}
.home-stat-card .hs-label{font-size:11px;color:var(--c-text-light)}
/* Featured pets strip */
.featured-strip{margin:8px 16px;overflow:hidden}
.featured-strip .fs-title{font-size:14px;font-weight:700;color:var(--c-text);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.featured-row{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;-ms-overflow-style:none;scrollbar-width:none;padding-bottom:4px}
.featured-row::-webkit-scrollbar{display:none}
.featured-pet{flex-shrink:0;width:120px;background:var(--c-card);border-radius:var(--radius-lg);padding:14px 10px;text-align:center;box-shadow:var(--c-shadow);scroll-snap-align:start;cursor:pointer;transition:all var(--transition);border:none;font-family:var(--font)}
.featured-pet:active{transform:scale(0.95)}
.featured-pet .fp-img{width:56px;height:56px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 6px}
.featured-pet .fp-name{font-size:13px;font-weight:700;color:var(--c-text)}
.featured-pet .fp-desc{font-size:10px;color:var(--c-text-light);margin-top:2px}
/* Activity feed */
.activity-feed{margin:0 16px 100px}
.activity-feed .af-title{font-size:14px;font-weight:700;color:var(--c-text);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.activity-item{display:flex;align-items:center;gap:10px;padding:12px;background:var(--c-card);border-radius:var(--radius-md);margin-bottom:6px;box-shadow:var(--c-shadow);cursor:pointer;transition:all var(--transition);border:none;font-family:var(--font);width:100%;text-align:left}
.activity-item:active{background:#FFF8F0}
.activity-item .ai-icon{font-size:20px;flex-shrink:0;width:32px;text-align:center}
.activity-item .ai-text{font-size:12px;color:var(--c-text);flex:1;line-height:1.5}
.activity-item .ai-time{font-size:10px;color:var(--c-text-light);flex-shrink:0}

/* ============ NOTIFICATIONS ============ */
.notif-bell{position:relative;cursor:pointer;font-size:18px;padding:0 4px;border:none;background:none;font-family:var(--font)}
.notif-badge{position:absolute;top:-4px;right:-2px;width:16px;height:16px;border-radius:50%;background:var(--c-heart);color:#FFF;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;display:none}
.notif-badge.show{display:flex;animation:heartPop .4s ease}
.notif-overlay{position:absolute;inset:0;z-index:90;background:#FFF;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(0.32,0.72,0,1)}
.notif-overlay.open{transform:translateX(0)}
.notif-header{display:flex;align-items:center;gap:12px;padding:4px 8px;border-bottom:1px solid var(--c-border);flex-shrink:0}
.notif-header .nf-back{font-size:22px;cursor:pointer;border:none;background:none;font-family:var(--font);padding:8px}
.notif-header .nf-title{font-size:16px;font-weight:700}
.notif-header .nf-clear{font-size:12px;color:var(--c-primary);cursor:pointer;margin-left:auto;border:none;background:none;font-family:var(--font);font-weight:600}
.notif-tabs{display:flex;padding:0 16px;border-bottom:1px solid var(--c-border);flex-shrink:0}
.notif-tab{flex:1;padding:10px;font-size:13px;font-weight:600;color:var(--c-text-light);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--font);transition:all var(--transition);position:relative}
.notif-tab.active{color:var(--c-primary);border-bottom-color:var(--c-primary)}
.notif-tab .nt-count{font-size:9px;background:var(--c-heart);color:#FFF;padding:1px 5px;border-radius:8px;margin-left:4px;display:none}
.notif-tab .nt-count.show{display:inline}
.notif-list{flex:1;overflow-y:auto;padding:8px 16px}
.notif-item{display:flex;align-items:flex-start;gap:10px;padding:12px;border-radius:var(--radius-md);margin-bottom:4px;transition:all var(--transition);cursor:pointer;border:none;background:none;font-family:var(--font);width:100%;text-align:left}
.notif-item:active{background:#FFF8F0}
.notif-item.unread{background:#FFF5EC}
.notif-item .ni-avatar{width:36px;height:36px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.notif-item .ni-body{flex:1;min-width:0}
.notif-item .ni-text{font-size:13px;color:var(--c-text);line-height:1.5}
.notif-item .ni-text b{color:var(--c-primary)}
.notif-item .ni-meta{font-size:10px;color:var(--c-text-light);margin-top:3px}
.notif-item .ni-dot{width:6px;height:6px;border-radius:50%;background:var(--c-heart);flex-shrink:0;margin-top:6px}

/* ============ DIARY CHARTS ============ */
.weight-section{margin:12px 16px 0;background:var(--c-card);border-radius:var(--radius-lg);padding:14px;box-shadow:var(--c-shadow)}
.weight-section .ws-title{font-size:13px;font-weight:700;color:var(--c-text);margin-bottom:8px}
.weight-chart{display:flex;align-items:flex-end;gap:10px;height:80px;padding:4px 0}
.weight-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.weight-bar{width:100%;max-width:36px;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--c-primary),var(--c-primary-light));transition:height .6s cubic-bezier(0.34,1.56,0.64,1);min-height:4px}
.weight-bar-label{font-size:10px;color:var(--c-text-light);margin-top:4px}
.weight-bar-val{font-size:10px;font-weight:700;color:var(--c-primary);margin-bottom:4px}
.countdown-row{display:flex;gap:8px;margin:12px 16px 0}
.countdown-card{flex:1;background:var(--c-card);border-radius:var(--radius-lg);padding:14px;box-shadow:var(--c-shadow);text-align:center}
.countdown-card .cd-emoji{font-size:28px;display:block;margin-bottom:4px}
.countdown-card .cd-num{font-size:24px;font-weight:800;color:var(--c-primary)}
.countdown-card .cd-label{font-size:11px;color:var(--c-text-light);margin-top:2px}

/* ============ Notification toast (in-app) ============ */
@keyframes slideInRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.slide-in-right{animation:slideInRight .35s cubic-bezier(0.32,0.72,0,1) forwards}

/* ============ PET PROFILE ============ */
.pet-profile-overlay{position:absolute;inset:0;z-index:90;background:var(--c-bg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(0.32,0.72,0,1)}
.pet-profile-overlay.open{transform:translateX(0)}
.pet-profile-hero{text-align:center;padding:24px 16px 16px;background:linear-gradient(180deg,var(--c-bg-warm) 0%,var(--c-bg) 100%)}
.pet-profile-hero .pp-avatar{width:80px;height:80px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;font-size:48px;margin:0 auto 10px;box-shadow:0 6px 24px rgba(255,140,66,0.2)}
.pet-profile-hero .pp-name{font-size:22px;font-weight:800;color:var(--c-text)}
.pet-profile-hero .pp-breed{font-size:13px;color:var(--c-text-mid);margin-top:2px}
.pet-profile-tags{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.pp-tag{font-size:11px;padding:4px 10px;border-radius:var(--radius-xl);background:var(--c-accent);color:var(--c-primary);font-weight:600}
.pet-profile-info{margin:12px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.pp-info-card{background:var(--c-card);border-radius:var(--radius-lg);padding:12px;text-align:center;box-shadow:var(--c-shadow)}
.pp-info-card .pp-ic-val{font-size:20px;font-weight:800;color:var(--c-primary)}
.pp-info-card .pp-ic-lbl{font-size:10px;color:var(--c-text-light);margin-top:2px}
.pet-profile-section{margin:0 16px 8px}
.pet-profile-section .pps-title{font-size:14px;font-weight:700;color:var(--c-text);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.pp-med-item{display:flex;gap:10px;padding:10px 12px;background:var(--c-card);border-radius:var(--radius-md);margin-bottom:6px;box-shadow:var(--c-shadow)}
.pp-med-item .ppm-date{font-size:11px;color:var(--c-text-light);flex-shrink:0;min-width:50px}
.pp-med-item .ppm-text{font-size:13px;color:var(--c-text);line-height:1.5}
.pp-med-item .ppm-icon{font-size:18px;flex-shrink:0}

/* ============ TOPIC PAGE ============ */
.topic-overlay{position:absolute;inset:0;z-index:90;background:var(--c-bg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(0.32,0.72,0,1)}
.topic-overlay.open{transform:translateX(0)}
.topic-header{display:flex;align-items:center;gap:12px;padding:4px 8px;border-bottom:1px solid var(--c-border);flex-shrink:0;background:var(--c-bg)}
.topic-header .th-back{font-size:22px;cursor:pointer;border:none;background:none;font-family:var(--font);padding:8px}
.topic-header .th-title{font-size:16px;font-weight:700;color:var(--c-text)}

/* ============ COLLECTIONS PAGE ============ */
.collections-overlay{position:absolute;inset:0;z-index:90;background:var(--c-bg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(0.32,0.72,0,1)}
.collections-overlay.open{transform:translateX(0)}
.collections-header{display:flex;align-items:center;gap:12px;padding:4px 8px;border-bottom:1px solid var(--c-border);flex-shrink:0;background:var(--c-bg)}
.collections-header .ch-back{font-size:22px;cursor:pointer;border:none;background:none;font-family:var(--font);padding:8px}
.collections-body{flex:1;overflow-y:auto;padding:12px 16px 80px}

/* ============ CARE TOOLS ============ */
.tools-overlay{position:absolute;inset:0;z-index:90;background:var(--c-bg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(0.32,0.72,0,1)}
.tools-overlay.open{transform:translateX(0)}
.tools-header{display:flex;align-items:center;gap:12px;padding:4px 8px;border-bottom:1px solid var(--c-border);flex-shrink:0;background:var(--c-bg)}
.tools-header .tl-back{font-size:22px;cursor:pointer;border:none;background:none;font-family:var(--font);padding:8px}
.tools-body{flex:1;overflow-y:auto;padding:16px}
.tool-card{background:var(--c-card);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;box-shadow:var(--c-shadow)}
.tool-card .tc-title{font-size:15px;font-weight:700;color:var(--c-text);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.tool-card .tc-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.tool-card select,.tool-card input{padding:8px 12px;border-radius:var(--radius-md);border:1.5px solid var(--c-border);font-size:13px;font-family:var(--font);color:var(--c-text);background:#FFF;outline:none}
.tool-card select:focus,.tool-card input:focus{border-color:var(--c-primary)}
.tool-card .tc-result{font-size:14px;font-weight:700;color:var(--c-primary);margin-top:8px;padding:10px;background:#FFF5EC;border-radius:var(--radius-md);text-align:center}
.tool-card .tc-btn{padding:10px 20px;border-radius:var(--radius-xl);background:var(--c-primary);color:#FFF;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);transition:all var(--transition)}
.tool-card .tc-btn:active{transform:scale(0.96)}
.tool-card .tc-note{font-size:11px;color:var(--c-text-light);margin-top:6px;line-height:1.5}

/* Quick tool buttons on home */
.quick-tools-bar{display:flex;gap:6px;padding:4px 16px;margin-bottom:6px;overflow-x:auto}
.quick-tool-btn{flex-shrink:0;padding:7px 14px;border-radius:var(--radius-xl);background:var(--c-card);color:var(--c-text);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--c-border);font-family:var(--font);white-space:nowrap;transition:all var(--transition)}
.quick-tool-btn:active{background:var(--c-primary);color:#FFF;border-color:var(--c-primary)}
</style>

// ==================== STATE ====================
let S;
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      S = createInitialData();
      if (saved.feeds) {
        saved.feeds.forEach(sf => {
          const df = S.feeds.find(f => f.id === sf.id);
          if (df) { df.liked=sf.liked; df.likes=sf.likes; df.collected=sf.collected; df.collects=sf.collects; df.comments=sf.comments; df.commentList=sf.commentList; }
          else S.feeds.unshift(sf);
        });
      }
      if (saved.diaries) {
        Object.keys(saved.diaries).forEach(pk => {
          if (S.diaries[pk]) {
            saved.diaries[pk].entries.forEach(se => {
              const de = S.diaries[pk].entries.find(e => e.id === se.id);
              if (de) { de.liked=se.liked; de.likes=se.likes; de.collected=se.collected; de.collects=se.collects; de.comments=se.comments; de.commentList=se.commentList; }
              else S.diaries[pk].entries.unshift(se);
            });
          }
        });
      }
      if (saved.currentPet) S.currentPet = saved.currentPet;
    } else { S = createInitialData(); }
  } catch(e) { S = createInitialData(); }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({feeds:S.feeds,diaries:S.diaries,currentPet:S.currentPet})); } catch(e) {}
}

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const mainContent = $('#mainContent');
const app = document.getElementById('app');
let toastTimer;

function showToast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

function updateStatusBar() {
  const n = new Date();
  $('#statusTime').textContent = n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
  $('#batteryLevel').textContent = Math.floor(85+Math.random()*15);
}
setInterval(updateStatusBar, 30000); updateStatusBar();

// ==================== NAVIGATION ====================
function navigateTo(name) {
  $$('.page').forEach(p => p.classList.remove('active'));
  $$('.nav-item').forEach(n => n.classList.remove('active'));
  const page = $('#page-'+name); if (page) page.classList.add('active');
  const nav = document.querySelector(`.nav-item[data-page="${name}"]`); if (nav) nav.classList.add('active');
  mainContent.scrollTop = 0;
  if (name === 'home') updateHomePage();
  if (name === 'square') renderFeeds(getChannel());
  if (name === 'diary') { renderPetSwitcher(); renderTimeline(S.currentPet); }
  if (name === 'profile') updateProfileStats();
}
$('#bottomNav').addEventListener('click', function(e) {
  const item = e.target.closest('.nav-item'); if (!item || item.classList.contains('nav-post')) return;
  navigateTo(item.dataset.page);
});

// ==================== SEARCH ====================
let searchTimer;
$('#searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer); const q = this.value.trim();
  if (!q) { $('#searchDropdown').classList.remove('show'); return; }
  searchTimer = setTimeout(() => doSearch(q), 200);
});
$('#searchInput').addEventListener('focus', function() { const q = this.value.trim(); if (q) doSearch(q); });
document.addEventListener('click', function(e) { if (!e.target.closest('.search-wrap')) $('#searchDropdown').classList.remove('show'); });

function doSearch(q) {
  const query = q.toLowerCase(); const results = [];
  S.feeds.forEach(f => { if (f.text.toLowerCase().includes(query)||f.user.name.toLowerCase().includes(query)||f.tags.some(t=>t.toLowerCase().includes(query))) results.push({type:'动态',name:f.user.name,desc:f.text.slice(0,50)+'...',avatar:f.user.avatar,feedId:f.id}); });
  Object.entries(S.diaries).forEach(([pk,pet]) => { pet.entries.forEach(e => { if (e.text.toLowerCase().includes(query)&&e.visibility!=='private') results.push({type:'日记',name:pet.name+'的日记',desc:e.text.slice(0,50)+'...',avatar:pet.emoji,diaryPet:pk,entryId:e.id}); }); });
  const dd = $('#searchDropdown');
  if (!results.length) dd.innerHTML = '<div class="search-empty">🔍 没有找到相关内容<br>换个关键词试试吧～</div>';
  else dd.innerHTML = results.slice(0,10).map(r => `<div class="search-item" data-type="${r.type}" data-feed="${r.feedId||''}" data-pet="${r.diaryPet||''}" data-entry="${r.entryId||''}"><div class="si-avatar" style="background:linear-gradient(135deg,#FFD4A8,#FFA86B)">${r.avatar}</div><div class="si-info"><div class="si-name">${r.name}</div><div class="si-desc">${r.desc}</div></div><span class="si-tag">${r.type}</span></div>`).join('');
  dd.classList.add('show');
}
$('#searchDropdown').addEventListener('click', function(e) {
  const item = e.target.closest('.search-item'); if (!item) return;
  $('#searchDropdown').classList.remove('show'); $('#searchInput').value = '';
  const type=item.dataset.type, feedId=parseInt(item.dataset.feed), petKey=item.dataset.pet, entryId=parseInt(item.dataset.entry);
  if (type==='动态'&&feedId) { navigateTo('square'); highlightCard('feed',feedId); showToast('🔍 找到相关动态～'); }
  else if (type==='日记'&&petKey) { navigateTo('diary'); S.currentPet=petKey; renderPetSwitcher(); renderTimeline(petKey); if(entryId) highlightCard('diary',entryId,petKey); showToast('🔍 找到相关日记～'); }
});
function searchTopic(topic) { $('#searchInput').value = '#'+topic; navigateTo('square'); doSearch(topic); showToast('🔍 搜索话题：#'+topic); }
function highlightCard(type,id,petKey) {
  setTimeout(() => {
    const card = type==='feed' ? document.querySelector(`.feed-card[data-fid="${id}"]`) : document.querySelector(`.diary-card[data-did="${id}"][data-pet="${petKey}"]`);
    if (card) { card.scrollIntoView({behavior:'smooth',block:'center'}); card.style.boxShadow='0 0 0 4px var(--c-primary)'; setTimeout(()=>{card.style.boxShadow='';},2500); }
  }, 400);
}

// ==================== FEEDS ====================
function getChannel() { const a=document.querySelector('.channel-tab.active'); return a?a.dataset.ch:'all'; }
function renderFeeds(channel) {
  let feeds = S.feeds;
  if (channel==='follow') { $('#feedList').innerHTML=`<div class="empty-wrap"><div class="empty-emoji">👀</div><div class="empty-text">还没有关注任何人～<br>去推荐页发现有趣的铲屎官吧！</div></div>`; return; }
  if (channel!=='all') { feeds=feeds.filter(f=>f.category===channel); if(!feeds.length){ $('#feedList').innerHTML=`<div class="empty-wrap"><div class="empty-emoji">🐾</div><div class="empty-text">这个频道还没有内容哦～<br>快去发布第一条吧！</div></div>`; return; } }
  $('#feedList').innerHTML = feeds.map((f,i) => {
    const n=f.images.length; let gc='g-1'; if(n===2)gc='g-2'; else if(n===3)gc='g-3'; else if(n>=4)gc='g-multi';
    return `<div class="feed-card fade-in" data-fid="${f.id}" style="animation-delay:${i*0.03}s" onclick="openPostDetail(${f.id})">
      <div class="card-top"><div class="avatar ${f.avClass}">${f.user.avatar}</div><div class="user-info"><div class="nickname">${f.user.name}</div><div class="meta-row"><span>${f.time}</span><span>📍 ${f.location}</span></div></div></div>
      <div class="card-body"><div class="content-text">${f.text.length>120?f.text.slice(0,120)+'<span class="expand-btn">...查看全文</span>':f.text}</div>
      ${n?`<div class="img-grid ${gc}">${f.images.map((img,j)=>`<img src="${img}" alt="" loading="lazy" onclick="event.stopPropagation();openLightbox(${f.id},'feed',${j})" onerror="this.style.display='none'">`).join('')}</div>`:''}</div>
      <div class="card-tags">${f.tags.map(t=>`<button class="card-tag" onclick="event.stopPropagation();searchTopic('${t}')">#${t}</button>`).join(' ')}</div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="act-btn like-btn ${f.liked?'is-liked':''}" onclick="toggleLike(${f.id})"><span class="like-icon">${f.liked?'❤️':'🤍'}</span> <span class="like-count">${f.likes}</span></button>
        <button class="act-btn" onclick="openComments('feed',${f.id})">💬 <span class="cmt-count">${f.comments}</span></button>
        <button class="act-btn coll-btn ${f.collected?'is-collected':''}" onclick="toggleCollect(${f.id})">${f.collected?'⭐':'☆'} <span class="coll-count">${f.collects}</span></button>
        <button class="act-btn" onclick="sharePost(${f.id})">↗️ 分享</button>
      </div></div>`;
  }).join('');
}
$('#channelRow').addEventListener('click', function(e) {
  const tab = e.target.closest('.channel-tab'); if (!tab) return;
  $$('.channel-tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); renderFeeds(tab.dataset.ch);
});

// ==================== LIGHTBOX ====================
let lbImages=[], lbIndex=0;
function openLightbox(id, type, startIdx) {
  let imgs = [];
  if (type==='feed') { const f=S.feeds.find(x=>x.id===id); if(f) imgs=f.images; }
  else { Object.values(S.diaries).forEach(p=>{ const e=p.entries.find(x=>x.id===id); if(e) imgs=e.images; }); }
  if (!imgs.length) return;
  lbImages=imgs; lbIndex=Math.min(startIdx,imgs.length-1);
  renderLightbox(); $('#lightbox').classList.add('open');
}
function renderLightbox() {
  $('#lbCounter').textContent = `${lbIndex+1} / ${lbImages.length}`;
  const track = $('#lbTrack');
  track.innerHTML = lbImages.map(img => `<div class="lightbox-slide"><img src="${img}" alt=""></div>`).join('');
  track.style.transform = `translateX(-${lbIndex*100}%)`;
  track.style.width = `${lbImages.length*100}%`;
  $$('.lightbox-slide').forEach(s => s.style.width = (100/lbImages.length)+'%');
  $('#lbDots').innerHTML = lbImages.map((_,i) => `<button class="lightbox-dot ${i===lbIndex?'active':''}" onclick="lbGoTo(${i})"></button>`).join('');
  $('#lbPrev').style.visibility = lbIndex===0?'hidden':'visible';
  $('#lbNext').style.visibility = lbIndex===lbImages.length-1?'hidden':'visible';
}
function lbPrev() { if(lbIndex>0){lbIndex--;renderLightbox();} }
function lbNext() { if(lbIndex<lbImages.length-1){lbIndex++;renderLightbox();} }
function lbGoTo(i) { lbIndex=i; renderLightbox(); }
function closeLightbox() { $('#lightbox').classList.remove('open'); }
$('#lightbox').addEventListener('click', function(e) { if(e.target===this) closeLightbox(); });
// Swipe support
let lbTouchStart=0;
$('#lbStage').addEventListener('touchstart', function(e) { lbTouchStart=e.touches[0].clientX; });
$('#lbStage').addEventListener('touchend', function(e) {
  const diff = lbTouchStart - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) { if (diff>0) lbNext(); else lbPrev(); }
});
document.addEventListener('keydown', function(e) {
  if (!$('#lightbox').classList.contains('open')) return;
  if (e.key==='ArrowLeft') lbPrev(); else if (e.key==='ArrowRight') lbNext(); else if (e.key==='Escape') closeLightbox();
});

      <button class="act-btn coll-btn ${f.collected?'is-collected':''}" onclick="toggleCollect(${f.id});refreshDetailActions(${f.id})">${f.collected?'⭐':'☆'} <span class="coll-count">${f.collects}</span></button>

      <button onclick="addDetailComment(${f.id})">发送</button>

  `;
  S._detailFeedId = feedId;
  S._detailReplyTo = null;
  $('#postDetail').classList.add('open');
}
function refreshDetailActions(feedId) {
  const f = S.feeds.find(x=>x.id===feedId); if (!f) return;
  const actions = $('#postDetailBody').querySelector('.pd-actions');
  if (actions) {
    const likeBtn = actions.querySelector('.like-btn');
    if (likeBtn) { likeBtn.classList.toggle('is-liked',f.liked); likeBtn.innerHTML = `<span class="like-icon">${f.liked?'❤️':'🤍'}</span> <span class="like-count">${f.likes}</span>`; }
    const collBtn = actions.querySelector('.coll-btn');
    if (collBtn) { collBtn.classList.toggle('is-collected',f.collected); collBtn.innerHTML = `${f.collected?'⭐':'☆'} <span class="coll-count">${f.collects}</span>`; }
  }
}
function renderCommentsHTML(list) {
  return list.map(c => `
    <div class="comment-item">
      <div class="cm-avatar">🐾</div><div class="cm-body">
        <div class="cm-name">${c.user}</div><div class="cm-text">${c.text}</div>
        <div class="cm-meta"><span>${c.time}</span><button class="cm-reply-btn" onclick="setDetailReply('${c.user}')">回复</button></div>
        ${(c.replies&&c.replies.length)?`<div class="cm-replies">${c.replies.map(r=>`<div class="cm-reply"><div class="cm-avatar" style="font-size:13px">🐾</div><div class="cm-body"><div class="cm-name">${r.user}</div><div class="cm-text">${r.text}</div><div class="cm-meta"><span>${r.time}</span></div></div></div>`).join('')}</div>`:''}
      </div></div>`).join('');
}
function setDetailReply(user) { S._detailReplyTo = user; $('#detailCommentInput').attr('placeholder','回复 @'+user+'...').focus(); }
function addDetailComment(feedId) {
  const input = $('#detailCommentInput'); const text = input.value.trim(); if (!text) return;
  const f = S.feeds.find(x=>x.id===feedId); if (!f) return;
  if (S._detailReplyTo) {
    const parent = f.commentList.find(c=>c.user===S._detailReplyTo);
    if (parent) { if(!parent.replies)parent.replies=[]; parent.replies.push({user:'我',text,time:'刚刚'}); }
    S._detailReplyTo=null; input.attr('placeholder','写下你的评论...');
  } else { f.commentList.push({user:'我',text,time:'刚刚',replies:[]}); }
  f.comments = f.commentList.reduce((s,c)=>s+1+(c.replies?c.replies.length:0),0);
  saveState(); openPostDetail(feedId); showToast('💬 评论成功');
}
function closePostDetail() { $('#postDetail').classList.remove('open'); }

function toggleLike(feedId) {
  const f = S.feeds.find(x=>x.id===feedId); if (!f) return; f.liked=!f.liked; f.likes+=f.liked?1:-1;
  const card = document.querySelector(`.feed-card[data-fid="${feedId}"]`);
  if (card) { const btn=card.querySelector('.like-btn'), icon=card.querySelector('.like-icon');
    if(btn) { btn.classList.toggle('is-liked',f.liked); if(icon){icon.textContent=f.liked?'❤️':'🤍';icon.classList.add('heart-pop');setTimeout(()=>icon.classList.remove('heart-pop'),450);}
    const cnt=btn.querySelector('.like-count'); if(cnt)cnt.textContent=f.likes; } }
  saveState();
}
function toggleCollect(feedId) {
  const f = S.feeds.find(x=>x.id===feedId); if (!f) return; f.collected=!f.collected; f.collects+=f.collected?1:-1;
  const card = document.querySelector(`.feed-card[data-fid="${feedId}"]`);
  if (card) { const btn=card.querySelector('.coll-btn'); if(btn){btn.classList.toggle('is-collected',f.collected); btn.innerHTML=(f.collected?'⭐':'☆')+' <span class="coll-count">'+f.collects+'</span>';} }
  showToast(f.collected?'⭐ 已收藏':'已取消收藏'); saveState();
}

function openComments(type, id, petKey) {
  S.currentComment = {type, feedId:type==='feed'?id:undefined, petKey:petKey||id, entryId:type==='diary'?id:undefined};
  S.replyTo=null; $('#replyHint').style.display='none'; $('#commentInput').placeholder='写下你的评论...'; $('#commentInput').value='';
  let list; if(type==='feed'){const f=S.feeds.find(x=>x.id===id);list=f?f.commentList:[];}
  else{const p=S.diaries[petKey||id];const e=p?p.entries.find(x=>x.id===id):null;list=e?e.commentList:[];}
  renderCommentModal(list); $('#commentModal').classList.add('open'); setTimeout(()=>$('#commentInput').focus(),350);
}
function renderCommentModal(list) {
  $('#commentList').innerHTML = renderCommentsHTML(list);
}
function setReply(user) { S.replyTo=user; $('#replyTarget').textContent='@'+user; $('#replyHint').style.display='inline-flex'; $('#commentInput').placeholder='回复 @'+user+'...'; $('#commentInput').focus(); }
function clearReply() { S.replyTo=null; $('#replyHint').style.display='none'; $('#commentInput').placeholder='写下你的评论...'; }
function addComment() {
  const text = $('#commentInput').value.trim(); if (!text) return;
  const cc=S.currentComment; if(!cc)return;
  let list; if(cc.type==='feed'){const f=S.feeds.find(x=>x.id===cc.feedId);if(!f)return;list=f.commentList;}
  else{const p=S.diaries[cc.petKey];const e=p?p.entries.find(x=>x.id===cc.entryId):null;if(!e)return;list=e.commentList;}
  if(S.replyTo){const parent=list.find(c=>c.user===S.replyTo);if(parent){if(!parent.replies)parent.replies=[];parent.replies.push({user:'我',text,time:'刚刚'});}S.replyTo=null;$('#replyHint').style.display='none';$('#commentInput').placeholder='写下你的评论...';showToast('💬 回复成功');}
  else{list.push({user:'我',text,time:'刚刚',replies:[]});showToast('💬 评论成功');}
  if(cc.type==='feed'){const f=S.feeds.find(x=>x.id===cc.feedId);if(f)f.comments=list.reduce((s,c)=>s+1+(c.replies?c.replies.length:0),0);}
  else{const p=S.diaries[cc.petKey];const e=p?p.entries.find(x=>x.id===cc.entryId):null;if(e)e.comments=list.reduce((s,c)=>s+1+(c.replies?c.replies.length:0),0);}
  saveState(); renderCommentModal(list); $('#commentInput').value='';

  if(cc.type==='feed'){const card=document.querySelector(`.feed-card[data-fid="${cc.feedId}"]`);if(card){const c=card.querySelector('.cmt-count');if(c)c.textContent=S.feeds.find(x=>x.id===cc.feedId)?.comments||0;}}

function renderTimeline(petKey) {
  const pet = S.diaries[petKey]; if (!pet) { $('#timelineWrap').innerHTML=''; return; }
  const entries = pet.entries, grouped = {};
  entries.forEach(e => { const m=e.date.slice(0,7); if(!grouped[m])grouped[m]=[]; grouped[m].push(e); });
  const mn={'2024-06':'2024年6月','2024-05':'2024年5月','2024-04':'2024年4月'};
  Object.keys(grouped).forEach(k=>{if(!mn[k])mn[k]=k.slice(0,4)+'年'+parseInt(k.slice(5,7))+'月';});
  $('#timelineWrap').innerHTML = Object.keys(grouped).sort().reverse().map(month => `
    <div class="tl-month"><div class="tl-m-label">● ${mn[month]||month}</div>
      ${grouped[month].map(e => {
        const vi={public:'🌍',friends:'⭐',private:'🔒'}, vl={public:'公开',friends:'好友可见',private:'仅自己'};
        const ni=e.images.length, dc=ni>=2?'d2':'d1';
        return `<div class="tl-date">${e.date.slice(8)}日${e.milestone?`<span class="tl-badge">${e.milestone}</span>`:''}</div>
        <div class="diary-card fade-in" data-did="${e.id}" data-pet="${petKey}">
          <span class="vis-badge" title="${vl[e.visibility]}">${vi[e.visibility]}</span>
          <div class="diary-text">${e.text.replace(/\n/g,'<br>')}</div>
          ${ni?`<div class="diary-imgs ${dc}">${e.images.map((img,i)=>`<img src="${img}" alt="" loading="lazy" onclick="openLightbox(${e.id},'diary',${i})" onerror="this.style.display='none'">`).join('')}</div>`:''}
          ${e.visibility!=='private'?`<div class="diary-actions">
            <button class="act-btn like-btn ${e.liked?'is-liked':''}" onclick="toggleDiaryLike('${petKey}',${e.id})"><span class="like-icon">${e.liked?'❤️':'🤍'}</span> <span class="like-count">${e.likes}</span></button>
            <button class="act-btn" onclick="openComments('diary',${e.id},'${petKey}')">💬 <span class="d-cmt-count">${e.comments}</span></button>
            <button class="act-btn coll-btn ${e.collected?'is-collected':''}" onclick="toggleDiaryCollect('${petKey}',${e.id})">${e.collected?'⭐':'☆'} <span class="coll-count">${e.collects}</span></button>
          </div>`:`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--c-border);font-size:12px;color:var(--c-text-light)">🔒 仅自己可见</div>`}
        </div>`;
      }).join('')}
    </div>`).join('');
}

function toggleDiaryLike(petKey, entryId) {
  const p=S.diaries[petKey]; if(!p)return; const e=p.entries.find(x=>x.id===entryId); if(!e)return;
  e.liked=!e.liked; e.likes+=e.liked?1:-1;
  const card=document.querySelector(`.diary-card[data-did="${entryId}"][data-pet="${petKey}"]`);
  if(card){const btn=card.querySelector('.like-btn'),icon=card.querySelector('.like-icon');
    if(btn){btn.classList.toggle('is-liked',e.liked);if(icon){icon.textContent=e.liked?'❤️':'🤍';icon.classList.add('heart-pop');setTimeout(()=>icon.classList.remove('heart-pop'),450);}
    const cnt=btn.querySelector('.like-count');if(cnt)cnt.textContent=e.likes;}}
  saveState();
}
function toggleDiaryCollect(petKey, entryId) {
  const p=S.diaries[petKey]; if(!p)return; const e=p.entries.find(x=>x.id===entryId); if(!e)return;
  e.collected=!e.collected; e.collects+=e.collected?1:-1;

function openPublish(type) {
  S.publishType=type; S.selectedImages=[]; S.selectedPet=S.pets[0]; S.selectedVisibility='private'; S.selectedTopics=[];

  $('#pubTopicVal').textContent='选择话题 ›'; $('#pubText').value='';
  $$('.pub-type-btn').forEach(b=>b.classList.toggle('sel',b.dataset.pt===type));
  resetPubImgs(); $('#publishModal').classList.add('open');
  if(publishModal.parentElement!==app) app.appendChild(publishModal);

}

function setPubType(type) {
  S.publishType=type; $('#pubTitle').textContent=type==='post'?'发布动态':'写日记';
  $('#pubOptVis').style.display=type==='diary'?'flex':'none';
  $('#pubOptPet').style.display=type==='diary'?'none':'flex';
  $$('.pub-type-btn').forEach(b=>b.classList.toggle('sel',b.dataset.pt===type));
}
function triggerImgInput() { $('#imgInput').click(); }
function handleImgSelect(event) {
  const files=Array.from(event.target.files), rem=9-S.selectedImages.length;
  files.slice(0,rem).forEach(file=>{const r=new FileReader();r.onload=function(e){S.selectedImages.push(e.target.result);renderPubImgs();};r.readAsDataURL(file);});
  event.target.value='';
}
function renderPubImgs() {
  const a=$('#pubImgs'); a.innerHTML=S.selectedImages.map((img,i)=>`<div class="pub-img-thumb"><img src="${img}" alt=""><button class="pub-img-del" onclick="event.stopPropagation();removePubImg(${i})">✕</button></div>`).join('');
  if(S.selectedImages.length<9) a.innerHTML+='<div class="pub-img-add" onclick="triggerImgInput()">＋</div>';
}
function removePubImg(i) { S.selectedImages.splice(i,1); renderPubImgs(); }
function resetPubImgs() { $('#pubImgs').innerHTML='<div class="pub-img-add" onclick="triggerImgInput()">＋</div>'; }
function doPublish() {
  const text=$('#pubText').value.trim(); if(!text&&!S.selectedImages.length){showToast('😺 请写点什么或添加图片吧～');return;}
  const type=S.publishType;
  if(type==='post'){
    S.feeds.unshift({id:Date.now(),user:{name:'我',avatar:S.selectedPet?.emoji||'🐱',avClass:'avatar-cat'},time:'刚刚',location:'上海',text,images:S.selectedImages.slice(),tags:S.selectedTopics.slice(),category:'cat',likes:0,comments:0,collects:0,liked:false,collected:false,commentList:[]});
    showToast('✅ 发布成功！');
  } else {
    const pet=S.diaries[S.currentPet]; const today=new Date().toISOString().slice(0,10);
    pet.entries.unshift({id:Date.now(),date:today,visibility:S.selectedVisibility||'public',text,images:S.selectedImages.slice(),likes:0,comments:0,collects:0,liked:false,collected:false,milestone:null,commentList:[]});
    showToast('✅ 日记发布成功！');
  }
  saveState(); closePublish(); resetPubImgs();
  if(type==='post'){navigateTo('square');renderFeeds(getChannel());}else{navigateTo('diary');renderPetSwitcher();renderTimeline(S.currentPet);}
  mainContent.scrollTop=0;
}
$('#publishModal').addEventListener('click',function(e){if(e.target===this)closePublish();});

// ==================== PULL TO REFRESH ====================
let pullStartY=0, pulling=false, pullDist=0;
const mainEl = document.getElementById('mainContent');
mainEl.addEventListener('touchstart', function(e) {
  if (mainEl.scrollTop <= 0) { pullStartY = e.touches[0].clientY; pulling = true; }
});
mainEl.addEventListener('touchmove', function(e) {
  if (!pulling) return;
  pullDist = e.touches[0].clientY - pullStartY;
  if (pullDist > 0) {
    const indicator = $('#pullIndicator');
    indicator.classList.add('active');
    indicator.classList.toggle('refreshing', pullDist > 50);
    if (pullDist < 50) {
      indicator.querySelector('.pull-text').textContent = '下拉刷新...';
    } else {
      indicator.querySelector('.pull-text').textContent = '释放刷新 ✨';
    }
  }
});
mainEl.addEventListener('touchend', function() {
  if (!pulling) return;
  const indicator = $('#pullIndicator');
  if (pullDist > 50) {
    indicator.querySelector('.pull-text').textContent = '正在刷新...';
    indicator.classList.add('refreshing');
    // Refresh current page
    const activePage = document.querySelector('.page.active');
    if (activePage) {
      const pageId = activePage.id;
      if (pageId === 'page-square') renderFeeds(getChannel());
      if (pageId === 'page-diary') { renderPetSwitcher(); renderTimeline(S.currentPet); }
      if (pageId === 'page-home') updateHomePage();
    }
    setTimeout(() => {
      indicator.classList.remove('active','refreshing');
      pullDist = 0;
      showToast('✅ 刷新完成');
    }, 600);
  } else {
    indicator.classList.remove('active','refreshing');
  }
  pulling = false; pullDist = 0;
});

  $('#petProfileBody').innerHTML = `
    <div class="pet-profile-hero">
      <div class="pp-avatar" style="background:${pet.avatarBg}">${pet.emoji}</div>
      <div class="pp-name">${pet.name}</div>
      <div class="pp-breed">${pet.breed} · ${pet.gender} · ${pet.age}</div>
      <div class="pet-profile-tags">${pet.tags.map(t=>`<span class="pp-tag">${t}</span>`).join('')}</div>
    </div>
    <div class="pet-profile-info">

      <div class="pp-info-card"><div class="pp-ic-val">${pet.color}</div><div class="pp-ic-lbl">毛色</div></div>

function closePetProfile() { $('#petProfileOverlay').classList.remove('open'); }
// Wire pet switcher avatars
const origRenderPetSwitcher = renderPetSwitcher;
renderPetSwitcher = function() {
  origRenderPetSwitcher();
  // Add click handler to pet cards to open profile on long press hint
  $$('.pet-card:not(.add-pet)').forEach(card => {
    card.addEventListener('click', function(e) {
      // Only open profile if already selected (second click)
      if (card.classList.contains('selected') && S._lastPetClick === card.dataset.pet) {
        openPetProfile(card.dataset.pet);
        S._lastPetClick = null;
      } else {
        S._lastPetClick = card.dataset.pet;
        setTimeout(() => { S._lastPetClick = null; }, 600);
      }
    });
  });
};

// ==================== TOPIC PAGE ====================
function openTopic(topic) {
  const feeds = S.feeds.filter(f => f.tags.some(t => t === topic));
  $('#topicTitle').textContent = '#' + topic;
  $('#topicCount').textContent = feeds.length + '条动态';
  $('#topicFeedList').innerHTML = feeds.length ? feeds.map(f => `
    <div class="feed-card fade-in" data-fid="${f.id}" onclick="openPostDetail(${f.id})">
      <div class="card-top"><div class="avatar ${f.avClass}">${f.user.avatar}</div><div class="user-info"><div class="nickname">${f.user.name}</div><div class="meta-row"><span>${f.time}</span><span>📍 ${f.location}</span></div></div></div>
      <div class="card-body"><div class="content-text">${f.text.slice(0,100)}...</div></div>
      <div class="card-tags">${f.tags.map(t=>`<button class="card-tag" onclick="event.stopPropagation();openTopic('${t}')">#${t}</button>`).join(' ')}</div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="act-btn like-btn ${f.liked?'is-liked':''}" onclick="toggleLike(${f.id})"><span class="like-icon">${f.liked?'❤️':'🤍'}</span> <span>${f.likes}</span></button>
        <button class="act-btn" onclick="openComments('feed',${f.id})">💬 ${f.comments}</button>
        <button class="act-btn coll-btn ${f.collected?'is-collected':''}" onclick="toggleCollect(${f.id})">${f.collected?'⭐':'☆'} ${f.collects}</button>
      </div>
    </div>
  `).join('') : '<div class="empty-wrap"><div class="empty-emoji">🏷️</div><div class="empty-text">该话题下暂无动态<br>快去发布第一条吧～</div></div>';
  $('#topicOverlay').classList.add('open');
  if (topicOverlay.parentElement !== app) app.appendChild(topicOverlay);
}
function closeTopic() { $('#topicOverlay').classList.remove('open'); }
// Wire card-tag clicks to open topic page
document.addEventListener('click', function(e) {
  const tag = e.target.closest('.card-tag');
  if (tag && !e.target.closest('.topic-overlay')) {
    const topic = tag.textContent.replace(/^#/,'');
    openTopic(topic);
  }
});

// ==================== COLLECTIONS ====================
function openCollections() {
  const collected = S.feeds.filter(f => f.collected);
  // Also check diary entries
  let diaryCollected = [];
  Object.entries(S.diaries).forEach(([pk, pet]) => {
    pet.entries.forEach(e => { if (e.collected) diaryCollected.push({...e, petKey:pk, petName:pet.name, petEmoji:pet.emoji}); });
  });

  $('#collectionsBody').innerHTML = `
    <div style="font-size:14px;font-weight:700;color:var(--c-text);margin-bottom:10px">⭐ 已收藏动态 (${collected.length})</div>
    ${collected.length ? collected.map(f => `
      <div class="feed-card" style="margin-bottom:8px;cursor:pointer" onclick="openPostDetail(${f.id})">
        <div class="card-top"><div class="avatar ${f.avClass}">${f.user.avatar}</div><div class="user-info"><div class="nickname">${f.user.name}</div><div class="meta-row"><span>${f.time}</span></div></div></div>
        <div class="card-body"><div class="content-text">${f.text.slice(0,80)}...</div></div>
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="act-btn coll-btn is-collected" onclick="toggleCollect(${f.id});openCollections()">⭐ <span>${f.collects}</span></button>
        </div>
      </div>
    `).join('') : '<div class="empty-wrap" style="padding:30px"><div class="empty-emoji">⭐</div><div class="empty-text">还没有收藏任何动态<br>去广场发现精彩内容吧～</div></div>'}
    ${diaryCollected.length ? `<div style="font-size:14px;font-weight:700;color:var(--c-text);margin:16px 0 10px">📖 已收藏日记 (${diaryCollected.length})</div>` : ''}
    ${diaryCollected.map(e => `
      <div class="diary-card" style="margin-bottom:8px;margin-left:0;cursor:pointer" onclick="closeCollections();navigateTo('diary');S.currentPet='${e.petKey}';renderPetSwitcher();renderTimeline('${e.petKey}');setTimeout(()=>highlightCard('diary',${e.id},'${e.petKey}'),400)">
        <span class="vis-badge">${e.petEmoji}</span>
        <div style="font-size:11px;color:var(--c-text-light);margin-bottom:4px">${e.petName} · ${e.date}</div>
        <div class="diary-text">${e.text.slice(0,80)}...</div>

          <button class="act-btn coll-btn is-collected" onclick="toggleDiaryCollect('${e.petKey}',${e.id});openCollections()">⭐ ${e.collects}</button>
        </div>
      </div>
    `).join('')}
  `;
  $('#collectionsOverlay').classList.add('open');
  if (collectionsOverlay.parentElement !== app) app.appendChild(collectionsOverlay);
}
function closeCollections() { $('#collectionsOverlay').classList.remove('open'); }

function calcFeeding() {
  const species = $('#feedSpecies').value;
  const weight = parseFloat($('#feedWeight').value) || 5;
  const activity = $('#feedActivity').value;
  let rate = species==='cat' ? 1.2 : species==='dog' ? 1.5 : 0.8;
  if (activity==='low') rate *= 0.85; else if (activity==='high') rate *= 1.2;
  const grams = Math.round(weight * rate * 10);
  $('#feedResult').innerHTML = `🍽️ 建议每日喂食 <b>${grams}g</b>（分2-3餐）<br><span style="font-size:11px;color:var(--c-text-light)">约 ${Math.round(grams/10)} 勺（以10g/勺计）</span>`;
}
function calcWater() {
  const species = $('#waterSpecies').value;
  const weight = parseFloat($('#waterWeight').value) || 5;
  const rate = species==='cat' ? 60 : 50;
  const ml = Math.round(weight * rate);
  $('#waterResult').innerHTML = `💧 建议每日饮水 <b>${ml}ml</b><br><span style="font-size:11px;color:var(--c-text-light)">约 ${Math.round(ml/200)} 杯（200ml/杯）</span>`;
}
function calcAge() {
  const species = $('#ageSpecies').value;
  const years = parseFloat($('#ageYears').value) || 1;
  let humanAge;
  if (species==='cat') {
    if (years<=1) humanAge=15; else if (years<=2) humanAge=24; else humanAge=24+(years-2)*4;
  } else if (species==='dog') {
    humanAge = Math.round(years*15); // small dog simplified
  } else if (species==='dog_mid') {
    humanAge = Math.round(years*12.5);
  } else if (species==='dog_large') {
    humanAge = Math.round(years*10.5);
  } else {
    humanAge = Math.round(years*8);
  }
  $('#ageResult').innerHTML = `🧬 相当于人类的 <b>${Math.round(humanAge)} 岁</b><br><span style="font-size:11px;color:var(--c-text-light)">实际年龄：${years} 岁</span>`;
}
